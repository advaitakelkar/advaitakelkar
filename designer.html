<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AK Designer Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }

    .toolbar__brand {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-right: 8px;
    }

    .bp-group {
      display: flex;
      gap: 6px;
    }

    .bp-btn {
      padding: 5px 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: none;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .bp-btn:hover { border-color: #888; color: #fff; }
    .bp-btn.is-active { background: #fff; color: #111; border-color: #fff; }

    .toolbar__url {
      flex: 1;
      min-width: 200px;
      padding: 5px 10px;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      color: #ddd;
      font-size: 12px;
      font-family: monospace;
    }

    .toolbar__url:focus { outline: none; border-color: #888; }

    .toolbar__nav {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      padding: 5px 10px;
      border: 1px solid #444;
      border-radius: 6px;
      background: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .nav-btn:hover { border-color: #888; color: #fff; }

    .toolbar__size {
      font-size: 11px;
      color: #555;
      min-width: 80px;
      text-align: right;
    }

    /* ── Canvas ── */
    .canvas-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    .canvas-device {
      position: relative;
      background: #000;
      border-radius: 2px;
      box-shadow: 0 0 0 1px #333, 0 8px 32px rgba(0,0,0,0.6);
      transition: width 0.3s ease;
      overflow: hidden;
    }

    .canvas-device iframe {
      display: block;
      width: 100%;
      border: none;
      height: 900px;
    }

    /* ── Breakpoint ruler ── */
    .ruler {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      padding-inline: 24px;
      gap: 0;
    }

    .ruler-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-inline: 8px;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: #444;
      border-right: 1px solid #2a2a2a;
      cursor: pointer;
      transition: color 0.15s ease;
    }

    .ruler-segment:hover,
    .ruler-segment.is-active { color: #fff; }

    /* Segment widths proportional to real breakpoints */
    .ruler-segment[data-bp="375"]  { flex: 375; background: rgba(255,100,100,0.04); }
    .ruler-segment[data-bp="768"]  { flex: 393; background: rgba(100,255,100,0.04); }
    .ruler-segment[data-bp="1024"] { flex: 256; background: rgba(100,100,255,0.04); }
    .ruler-segment[data-bp="1440"] { flex: 416; background: rgba(255,255,100,0.04); }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar__brand">AK Preview</span>

  <div class="bp-group" id="bp-group">
    <button class="bp-btn" data-w="375"  onclick="setWidth(375)">Mobile<br/><small>375</small></button>
    <button class="bp-btn" data-w="768"  onclick="setWidth(768)">Tablet<br/><small>768</small></button>
    <button class="bp-btn" data-w="1024" onclick="setWidth(1024)">Laptop<br/><small>1024</small></button>
    <button class="bp-btn is-active" data-w="1440" onclick="setWidth(1440)">Desktop<br/><small>1440</small></button>
    <button class="bp-btn" data-w="100%" onclick="setWidth('100%')">Full</button>
  </div>

  <div class="toolbar__nav">
    <button class="nav-btn" onclick="navigate('/')">Home</button>
    <button class="nav-btn" onclick="navigate('/projects')">Projects</button>
    <button class="nav-btn" onclick="navigate('/about')">About</button>
  </div>

  <input
    class="toolbar__url"
    id="url-input"
    type="text"
    value="http://localhost:4321/"
    placeholder="http://localhost:4321/"
    onchange="loadUrl(this.value)"
    onkeydown="if(event.key==='Enter') loadUrl(this.value)"
  />

  <span class="toolbar__size" id="size-label">1440 × 900</span>
</div>

<div class="canvas-wrap">
  <div class="canvas-device" id="device" style="width:1440px">
    <iframe id="preview" src="http://localhost:4321/" title="Preview"></iframe>
  </div>
</div>

<div class="ruler">
  <div class="ruler-segment" data-bp="375"  onclick="setWidth(375)"  title="Mobile 375px">375</div>
  <div class="ruler-segment" data-bp="768"  onclick="setWidth(768)"  title="Tablet 768px">768</div>
  <div class="ruler-segment" data-bp="1024" onclick="setWidth(1024)" title="Laptop 1024px">1024</div>
  <div class="ruler-segment is-active" data-bp="1440" onclick="setWidth(1440)" title="Desktop 1440px">1440</div>
</div>

<script>
  const device  = document.getElementById('device');
  const iframe  = document.getElementById('preview');
  const urlInput = document.getElementById('url-input');
  const sizeLabel = document.getElementById('size-label');

  const BASE = 'http://localhost:4321';

  function setWidth(w) {
    if (w === '100%') {
      device.style.width = '100%';
    } else {
      device.style.width = w + 'px';
    }
    updateBpButtons(w);
    updateSizeLabel(w);
  }

  function navigate(path) {
    const currentSrc = iframe.src;
    const url = new URL(currentSrc);
    url.pathname = path;
    iframe.src = url.href;
    urlInput.value = url.href;
  }

  function loadUrl(url) {
    iframe.src = url;
  }

  function updateBpButtons(active) {
    document.querySelectorAll('.bp-btn').forEach(btn => {
      const w = btn.dataset.w;
      btn.classList.toggle('is-active', w == String(active));
    });
    document.querySelectorAll('.ruler-segment').forEach(seg => {
      seg.classList.toggle('is-active', seg.dataset.bp == String(active));
    });
  }

  function updateSizeLabel(w) {
    const h = device.querySelector('iframe')?.offsetHeight ?? 900;
    sizeLabel.textContent = (w === '100%' ? 'Full' : w) + ' × ' + h;
  }

  // Sync URL bar on iframe navigation
  iframe.addEventListener('load', () => {
    try {
      urlInput.value = iframe.contentWindow.location.href;
    } catch(e) {}
  });
</script>
</body>
</html>
