name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Astro site
        run: pnpm build

      - name: Deploy to Firebase Hosting
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ADVAITAKELKAR_SITE }}
        run: |
          printf '%s' "$SA_JSON" > /tmp/sa-key.json
          echo "Key file size: $(wc -c < /tmp/sa-key.json) bytes"
          echo "Key starts with: $(head -c 1 /tmp/sa-key.json)"
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json npx firebase-tools@latest deploy --only hosting --project advaitakelkar-site
# Trigger build 4
