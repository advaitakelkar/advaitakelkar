title: "Virtual Gods"
year: "2020"
tagline: "India's first online group art exhibition."
intro:
  - "In August 2020, with galleries shut and everyone locked down, the ARCHV collective built an exhibition that could only exist online. Sixteen participants were split into four groups. Each person was handed an architect and asked to distill that architect into a single module."
  - "Then the modules were fused. Each pair merged their two forms into one, keeping both ideologies intact; each group merged their pairs into a surreal 3D world. This wheel is the map of that process. Start anywhere."
# The four quadrants of the wheel, clockwise from the top-left, exactly as they
# sit on the original poster (public/images/virtual-gods/VG_Process.jpg).
# Reading the wheel: four modules on the outer ring fuse into two mergers on the
# middle ring, which resolve into one world at the center.
