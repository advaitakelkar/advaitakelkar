role: "Architectural Designer + Researcher"
degree: "Master of Architecture · SCAD '27 · Mumbai"
bioLead: "I'm Adi, <span class=\"bio-highlight-name\">Advaita Kelkar</span>, a Master of Architecture student at the Savannah College of Art and Design (SCAD). I grew up in Mumbai, where I learned early to love design thinking and making things with my hands, and my work since has spanned architecture, interior design, and web design."
bioMore:
  - "I like problems that don't fit neatly inside one discipline. Whether the answer calls for a drawing, a prototype, or a piece of code, I borrow from whatever field fits the question, and I genuinely enjoy the process of making, from first sketch to final detail."
  - "Along the way I've worked at the intersections of architecture, interiors, and the web, contributing to installations, exhibitions, and product design. I also curate content on computational design and AI, two tools that now sit at the center of my own practice."
  - "I believe good design can change how people live, and I want to keep testing that belief across every medium I can reach. If something here resonates with you, reach out. I'm always glad to connect and collaborate."
careerTagline: "From Mumbai studios to the SCAD fabrication shop: the roles, teams, and projects that shaped how I work."
skillsetSubtitle: "One searchable archive spanning my academic, professional, freelance, and experimental work."
