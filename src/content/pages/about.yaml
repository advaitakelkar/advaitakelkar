role: "Architectural Designer + Researcher"
degree: "Master of Architecture · SCAD ‘27 · Mumbai"
bioLead: "I’m Adi – <span class=\"bio-highlight-name\">Advaita Kelkar</span>, a Master of Architecture student at the Savannah College of Art and Design (SCAD), with professional experience and interests spanning architecture, interior design, and web design. Hailing from Mumbai, India, my upbringing instilled in me a profound passion for design thinking and hands-on creation."
bioMore:
  - "I am driven by a commitment to continuous growth and collaboration, leveraging design’s transformative power to address challenges across creative domains. My problem-solving approach is multidimensional, drawing from a wide range of disciplines, and I find immense joy in the process of creation—always aiming to innovate and push boundaries."
  - "Throughout my journey, I’ve explored dynamic intersections between architecture, interior design, and web design, contributing to projects such as installations, exhibitions, and product design. Additionally, I curate content on computational design and AI, reflecting my keen interest in the intersection of technology and creativity."
  - "I believe in the limitless potential of design to overcome obstacles and inspire change, and I aspire to explore and create across all realms of creativity. Let’s connect and collaborate to shape impactful designs together."
careerTagline: "Dissolving roles and evolutions: Professional journey from Mumbai teams to SCAD fabrication, always fusing leadership with innovation."
skillsetSubtitle: "A searchable interface that blends all projects—academic, work, free, and experiments—into one seamless digital archive for holistic discovery"
