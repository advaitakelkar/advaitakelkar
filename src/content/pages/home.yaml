tagline: "Architectural Designer"
intro:
  - "Hey, I’m Adi — Advaita Kelkar — an architectural designer from Mumbai, currently at SCAD in Savannah, USA. I work across architecture, interiors, urban design and everything in between — computation, sculpture, graphic design, product. Not isolated projects, but interconnected expressions of one way of seeing the world. Always curious, always making. Glad you’re here!"
  - "I’m an architect at heart — I think in systems, in how many parts come together to form a coherent whole. Every discipline I work across — designing, ideating, prototyping, making, documenting — is just a different medium for the same architectural way of thinking. Like my work, this archive doesn’t compartmentalise: it invites fluid navigation, tracing the threads of form, material and concept as they recur and evolve from one project to the next."
