tagline: "Architectural Designer"
intro:
  - "Hey, I'm Adi (Advaita Kelkar), an architectural designer from Mumbai, currently at SCAD in Savannah, USA. I work across architecture, interiors, and urban design, plus everything in between: computation, sculpture, graphic design, product. To me these aren't separate pursuits; they're one way of seeing the world. Always curious, always making. Glad you're here."
  - "I'm an architect at heart. I think in systems, in how many parts come together to form a coherent whole. Designing, ideating, prototyping, making, documenting: each is a different medium for the same architectural way of thinking. Like my work, this archive doesn't keep things in boxes. Wander through it freely, and you'll notice forms, materials, and ideas recur and evolve from one project to the next."
