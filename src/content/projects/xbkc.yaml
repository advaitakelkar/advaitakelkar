description: |
  <p>XBKC is a spatial visualization project for an apartment interior, created in collaboration with Sneha Desai and Studio Stumbles. It explores a French Pop aesthetic applied to a modern 3BHK flat in Mumbai's Bandra Kurla Complex (BKC).</p>
  <p>The concept ties the bedrooms, living space, and kitchen together through pastel color blocks, clean lines, and playful geometries. The renders feature bespoke curved furniture, custom lighting accents, and tactile surfaces that bring the energetic French Pop sensibility into a contemporary urban home.</p>
