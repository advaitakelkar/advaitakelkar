description: |
  <p>XBKC is a spatial visualization project for an apartment interior, created in collaboration with Sneha Desai and Studio Stumbles. The visualization explores a vibrant French Pop aesthetic applied to a modern 3BHK flat located in the upscale Bandra Kurla Complex (BKC) commercial district of Mumbai.</p>
  <p>The design concept traces the relationship between the bedrooms, main living space, and kitchen through cohesive pastel color blocks, clean lines, and playful geometries. The interior renders feature bespoke curved furniture, custom lighting accents, and tactile surfaces that bring the energetic French Pop sensibility into a contemporary urban residential layout.</p>
