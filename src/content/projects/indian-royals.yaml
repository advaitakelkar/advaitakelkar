description: |
  <div class="desc-scroll">
    <p>India's history is full of kings and queens whose faces, fashion, and presence have faded into the archives. This visual experiment uses generative AI as a restorative tool, translating fragmentary descriptions and traditional royal portraits into vivid, detailed representations. Recreating their ornaments, textiles, and expressions is an attempt to return their style and presence to the modern imagination.</p>
    <p style="margin-top: 16px; font-size: var(--_tokens---type--micro); color: var(--_tokens---color--muted);">
    <em>People in this study: Emperor Akbar, Emperor Ashoka, Rani Padmini of Chittor.</em>
  </p>
