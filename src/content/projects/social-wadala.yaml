description: |
  <p>Located in the old town of Wadala, this SOCIAL venue is designed as a rustic, Gothic experience. Built primarily from metal and concrete, the restaurant features a raw, industrial vibe highlighted by an experimental double-decker seating layout constructed completely from plastered metal sheets and concrete walls.</p>
  <p>The space explores raw materiality with a custom monolithic top concrete flooring and an unstepped bar layout to create a unique, Gothic-inspired hospitality experience in Wadala, Mumbai.</p>

