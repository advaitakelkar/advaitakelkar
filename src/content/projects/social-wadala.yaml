description: |
  <p>In the old town of Wadala, this SOCIAL is designed as a rustic, Gothic experience. Built primarily from metal and concrete, the restaurant leans into a raw, industrial character, with an experimental double-decker seating structure constructed entirely from plastered metal sheets and concrete walls.</p>
  <p>The material honesty runs through everything: a custom monolithic concrete floor, an open bar layout, and surfaces left rough where most restaurants would polish them. The result is a Gothic-inspired room unlike anything else in the neighborhood.</p>

