description: |
  <p>Scarpin is a graphic design and poster-making exercise started during the COVID lockdown as part of ARCHV. Stuck indoors, we turned architecture into graphics, distilling buildings and architectural ideas into bold posters we could make quickly and share online.</p>
  <p>A collective exercise with Sneha Desai, Varun Mehta, and Nayan Mote.</p>

