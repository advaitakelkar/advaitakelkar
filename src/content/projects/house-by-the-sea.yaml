description: |
  <p>Created for our clients Anand and Nishi, this project is a modern, luxury residence located in a premier building overlooking the sea on Malabar Hill. The design combines contemporary layouts with classic, old-fashioned details that pay homage to the building's heritage.</p>
  <p>The apartment's interior features a rich palette of materials including warm wood panels, natural stone details, custom lighting fixtures, and custom-designed furniture that optimize the expansive living space and frame the spectacular coastal views.</p>
