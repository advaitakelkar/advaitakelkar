description: |
  <p>Designed for our clients Anand and Nishi, this is a modern residence in an old building overlooking the sea on Malabar Hill. The design pairs contemporary layouts with classic, old-fashioned details that honor the building's heritage rather than erase it.</p>
  <p>Inside, warm wood paneling, natural stone, custom lighting, and custom-designed furniture open up the living spaces and frame the coastal views the apartment was chosen for.</p>
