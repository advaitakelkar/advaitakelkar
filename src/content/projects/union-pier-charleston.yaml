description: |
  <p>Tasked with developing an urban design proposal for the barren, heavily concreted Union Pier in Charleston, South Carolina, this project aimed to balance modern development with the city’s rich historical context. The design process navigated multiple challenges, including heritage integration, alignment with Charleston’s urban fabric, and adherence to strict building regulations, all while proposing a livable, future-forward space that enhances community engagement.</p>
  <p>A key aspect of the proposal was the integration of the historic Battery Wall, preserving its cultural significance while incorporating it into the site’s modern design language. The proposal introduced a semi-basement public parking facility, optimizing land use while ensuring pedestrian-friendly streetscapes. Above it, a modern bazaar activated the waterfront, fostering economic vibrancy. A network of mixed-use structures was envisioned, integrating commercial and public amenities on the lower levels with residences above, creating a harmonious blend of urban living, commerce, and public space. The plan prioritized green spaces, offering much-needed breathing room within the dense urban core, fostering a modern yet contextually sensitive urban environment for Charleston’s evolving needs.</p>
