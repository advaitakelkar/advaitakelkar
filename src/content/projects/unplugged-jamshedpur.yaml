description: |
  <p>Unplugged sits in Jamshedpur, the steel town set in the middle of Jharkhand — India's first planned industrial city, a place built, from its founding, around the act of making things. Its client, Anil Khemka, wanted something genuinely new for the city: a restaurant unlike anything Jamshedpur had seen. For the studio it became something rarer still — an open brief and a licence to experiment, to push at the very idea of what a restaurant interior could be. What began as a fit-out turned into a piece of research, carried out largely on site, in the open, by hand.</p>
  <p>The governing idea was handmade — taken to an almost obsessive level. Rather than specify finishes from a catalogue, the team chose to make the building's surfaces themselves, from scratch. Every tile was cast by hand in bespoke moulds, treating concrete not as a structural given but as a material to be shaped, pressed and moulded like clay. From these hand-cast units the studio built up a kind of mathematical system — a quantitative logic of repeating modules — pushing the materiality of ordinary concrete to see how far a humble grey mix could be coaxed toward richness and depth. It was, in the truest sense, a labour of love: benches, moulds and drying tiles spread across the raw shell, the design worked out in real time between laptop and workbench, hands and dust.</p>
  <p>Those hand-made units accumulate into the architecture. The floors are laid in terrazzo studded with large, broken pieces of marble — an oversized, coarse-grained inlay that reads almost as a landscape underfoot rather than a conventional polished floor. Above, the walls were hand-plastered and then set with the cast concrete tiles, each a geometric, coffered relief, pressed on in bands so that whole surfaces resolve into a single, hand-built monolith, contrasted here and there against warm timber. Even the structure is drawn into the game: the columns are wrapped and detailed with the same corner tiles, so that nothing is left as a bare, default element — every surface carries the mark of the hand that made it. Nothing arrives finished from a factory; each panel keeps the small irregularities of its mould, so the room reads as genuinely assembled rather than simply installed.</p>
  <p>The bar sits at the centre of it all and gathers the whole material argument into one object — a composite of tile, timber, marble and, pointedly, the offcuts and waste of everything else, a deliberate 'waste of the waste' that turns leftover material into the room's centrepiece. The commitment extends to the furniture and even the lighting, all made by hand to a simple, honest geometry, of a piece with the surfaces around them. Unplugged is, above everything, a process made visible — an experimental project born of homework, patience and labour on site, where every tile, wall, column and fitting was made from nothing. It stands less as a finished interior than as a record of learning by making: proof of how far raw concrete, broken marble and the discipline of the hand can be pushed.</p>

