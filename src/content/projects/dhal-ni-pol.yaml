description: |
  <p>Titled Traces and Territory, this is a site-specific dichroic acrylic installation built inside Dhal Ni Pol, one of the historic walled neighborhoods of old Ahmedabad. The panels catch the pol's light and throw it back in shifting color, reading the heritage fabric through reflection rather than restoration.</p>
  <p>Built in 2019 with the ARCHV collective: Sneha Desai, Varun Mehta, Nayan Mote, and myself.</p>

