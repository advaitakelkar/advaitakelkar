description: |
  <p>Salt Water Cafe is a Bandra institution, and it was already thriving when we arrived. So our intervention was deliberately restrained: work around the restaurant's daily rhythm, and add only what the space was missing.</p>
  <p>The brief was the intimate upper floor, used for curated events and gatherings that draw performers and guests from across the country. We kept the material palette minimal and honest, then layered in bespoke lighting fixtures and custom-built furniture. The goal was a room that feels contemporary but still belongs to the cafe's long history.</p>
