description: |
  <p>ARCHV is a collective of passionate individuals driven by a commitment to exploration and learning through hands-on creation. Founded by Sneha Desai, Varun Mehta, Nayan Mote, and myself, the team advocates for community engagement through self-initiated projects spanning art, architecture, design, engineering, and fabrication.</p>
  <p>By embracing diverse disciplines and perspectives, we foster a collaborative, selfless approach to creative work. Our projects and philosophy are documented in an online archive, serving as a resource for like-minded individuals pursuing innovation and shared learning.</p>

