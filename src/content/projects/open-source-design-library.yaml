description: |
  <p>The Open Source Design Library (OSL) is a collaborative initiative aimed at creating an open-access archive where designers can submit functional prototypes of products. The library provides detailed instructional build guides for other designers to recreate, iterate, and customize these designs, directly promoting an open-source sharing culture in India.</p>
  <p>Originally hosted live on our website, the platform successfully approved and published multiple community submissions. These resource files remain accessible for design students and professionals to freely download, study, and fabricate.</p>
