description: |
  <p>The Open Source Design Library (OSL) is a collaborative initiative: an open-access archive where designers submit functional product prototypes, each with a detailed build guide so others can recreate, iterate on, and customize the design. The goal was simple, to seed an open-source sharing culture in Indian design.</p>
  <p>Hosted live on the ARCHV website, the platform reviewed and published multiple community submissions. The resource files are still there, free for design students and professionals to download, study, and fabricate.</p>
