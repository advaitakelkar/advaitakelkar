description: |
  <p>Under the Tree occupies a steep, wooded plot in the hills of Karjat, the monsoon-green belt in the foothills of the Sahyadris where Mumbai goes to escape itself for the weekend. The land drops sharply away from the highway that grazes its upper edge, and across it spread the broad canopies of old banyan trees that give the project both its name and its subject. The clients — keen beekeepers, with an apiary set into the slope below — asked for something modest: a low-cost weekend farmhouse and retreat that could sit within this difficult terrain without fighting it. Two conditions shaped everything that followed: the slope itself, which made building both costly and delicate, and security, since the plot sat open and exposed at the edge of the hills.</p>
  <p>Rather than carve a flat pad from the hillside, the house was designed to disappear into it. Its lower volume is buried into the contour, masking the topography so the land reads as almost untouched, while the plan rises vertically through several compact levels to keep its footprint on the ground as small as possible. Where a tree stood, the house was shaped to build around it rather than through it, folding the existing banyans into the architecture. The result treats the whole structure almost as a temporary presence on the land — a light, reversible intervention that could be renewed, replaced and rebuilt over time as the site and the family changed.</p>
  <p>The defining gesture is the roof: a single barn-shaped form that sweeps over the entire dwelling in one continuous move. Its ridge is not merely a covering but a walkable bridge, entered directly from the high edge of the slope, that carries you out over the house and the land. From this vantage the whole site opens up in a single sweep — including the apiary set below — turning the roof into the project's principal room and its finest view. Arrival becomes an event in itself — you cross the bridge before you ever step into a room, the wooded slope falling away on either side. That elevated high point also quietly solved the security problem: by commanding the entire contour from above, the house watches over its own ground, sparing the client the cost of fencing and boundary works.</p>
  <p>The construction is honest and economical, matched to the low budget and the light-touch ambition. Rough local stone forms the grounded, load-bearing base — the same rubble that surfaces across the Karjat hills — carrying a demountable metal frame above, so the upper house can be dismantled and remade without scarring the site. Vehicles arrive at the top and drop directly into a garage tucked beneath the house, sheltered by the mass of the building and freeing the rest of the ground for the trees. Everything is arranged around minimum intervention: build above the land, touch it as little as possible, and let the banyans, the slope and the bees remain the true occupants of the site. Under the Tree is less a farmhouse imposed on a hill than a quiet frame built to watch one.</p>

