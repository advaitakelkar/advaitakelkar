description: |
  <p>Mainland China is a much-loved Chinese restaurant chain, famous for the tagline <em>'If It's Chinese, It's Mainland China.'</em> For its Andheri location we were asked to rebrand and reimagine the space, translating a menu that travels from Sichuan to Jiangsu to the streets of Beijing into a single dining room.</p>
  <p>The redesigned interior pairs stone flooring with brass inlays, beveled glass wall paneling, and ribbed glass partitions set with marble. Metal partitions divide the room, and a decorative abacus wall, built bead by bead, anchors the whole composition.</p>
  <p>The result sits deliberately between old and new: a contemporary room that still carries the weight of Chinese tradition. The aim was to make a familiar restaurant feel young again without losing what its regulars loved about it.</p>
