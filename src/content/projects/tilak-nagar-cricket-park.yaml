description: |
  <p>A civic landscape proposal to the BMC reimagining the Tilak Nagar maidan as a genuinely inclusive public park. Mumbai's maidans are dominated by cricket, and everyone else, the walkers, the elderly, the kids too small for the game, gets pushed to the edges. This design keeps the pitch but reclaims the perimeter, making room for all the other lives a neighborhood ground has to hold.</p>

