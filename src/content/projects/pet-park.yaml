description: |
  <p>A landscape proposal to the BMC for transforming an underused neighborhood dog park in Mumbai. The design rethinks the ground itself, giving the city's dogs and the people who walk them a shared space that actually works for both.</p>
  <p>Designed with Faizan Khatri and Devarsh Deth as a self-initiated civic project, a companion piece to our animal crematorium proposal.</p>

