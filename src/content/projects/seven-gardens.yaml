description: |
  <p>Located on the outskirts of Jaipur, the 7 Gardens Experimental Farm House was built on a 100% sustainable philosophy: utilizing the soil excavated directly from the site to construct the building's structural rammed-earth walls. Designed as a sanctuary in the middle of nowhere, the home is organized around seven distinct gardens, framing both external agricultural landscapes and internal garden courtyards.</p>
  <p>Beginning in 2019 at the initial foundation and design phase, this project marked my first architectural journey from early concept through to final completion, spanning a total of six years of construction, navigating through the lockdowns to realize a fully sustainable home.</p>

