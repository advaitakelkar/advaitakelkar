description: |
  <p>On the outskirts of Jaipur, Seven Gardens is an experimental farmhouse built on a simple, fully sustainable premise: the soil excavated from the site becomes the structural rammed-earth walls of the house. A sanctuary in the middle of nowhere, the home is organized around seven distinct gardens that frame the farmland outside and the courtyards within, buffering the house against the Rajasthan climate.</p>
  <p>I joined at the foundation and design phase in 2019, and this became my first project to travel the full arc from early concept to completion: six years of construction, carried through the lockdowns, to realize a fully sustainable home.</p>

