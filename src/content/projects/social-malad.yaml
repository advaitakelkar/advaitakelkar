description: |
  <p>A new edition of SOCIAL in suburban Malad, inside Mumbai's Inorbit Mall. The brief was simple and generous: freely create the SOCIAL vibe in Malad. We took it as a chance to experiment with a central bar and tiered seating layout.</p>
  <p>The theme is 'work in progress.' Malad is one of Mumbai's fastest-changing redevelopment hubs, with the metro and new infrastructure rising all around it, and the design tells that story through construction signage set into the flooring, custom curtains, raw walls and facades, sofas, and dedicated VIP areas. Every seat faces the central bar, so the whole room works like theater seating for performances, dining, and parties. A massive green wall wraps the space, adding a tropical edge to the suburban setting.</p>

