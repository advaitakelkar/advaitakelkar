description: |
  <p>A new edition of SOCIAL in the suburban Malad region in the Inorbit Mall of Mumbai. The idea was an experimentation with a central bar layout in a test seating fashion. The brief was simple: to freely create the SOCIAL vibe in Malad.</p>
  <p>The design focuses on the theme of 'work in progress' as Malad is an upcoming redevelopment hub in Mumbai, capturing the story of suburban Mumbai's redevelopment with the upcoming metro and infrastructure projects around it. The venue follows this theme through signs in the flooring, custom curtains, steam, walls, facades, sofas, and dedicated VIP areas. Every seat in front of the central layout enjoys a view of the entire space, transforming it into a theatre seating arrangement for performances, dining, and parties. A massive green wall surrounds the space, adding a tropical edge to the suburban setting.</p>

