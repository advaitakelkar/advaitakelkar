description: |
  <p>EPISODE Powai marks the brand's arrival in Bombay, dropped into one of the most competitive hospitality landscapes in the city. Powai — the planned, lakeside district around Hiranandani — is dense with restaurants and bars all fighting for the same crowd, and the design had to announce itself the moment you walked in. Where a club of this kind might normally be spread across a suite of separate rooms, here the entire programme is compressed into a single grand volume: ballroom, lounge and bar gathered together into one continuous, high-drama space, with everything organised around a single powerful centre. At roughly six thousand square feet, it was conceived as a fully immersive room — an environment you step inside and are surrounded by, rather than a set of tables to be seated at — so that the architecture itself becomes the reason to arrive.</p>
  <p>That centre is a triangular planter set at the very heart of the room — a raised island of greenery that acts as the focus around which the whole space turns. The active zone gathers immediately around it, with the DJ booth placed just off the planter at dead centre, and booth-lined ceilings folding down along either side to hold and enclose the crowd. The plan reads as a single gesture: a green core, an energetic ring, and a soft perimeter of seating, so that wherever you sit you are oriented back toward the same charged middle.</p>
  <p>The signature move is written in marble. A local black-and-white marble was cut into slender fluted staves and then split, one after another, to open out a mirrored, repeating figure — a pattern deployed across the walls like a giant material tattoo, running the full length of the facade and framed, top and bottom, by continuous timber moulding. Underfoot, the same black-and-white marble is laid as a concentric inlay that reads almost as graphic design, a drawn pattern spreading out beneath the room. Overhead, the ceiling steps in charred timber — burnt and half-burnt woods in a stepped rhythm — pressing a dark, textured lid down over the pale marble and the green core.</p>
  <p>The material intensity peaks at the taproom, where a single vast sheet of stainless steel carries the fluted marble motif onward — the same ribbed figure repeating in black, green and white marble, wrapping the bar in a hard, reflective skin. Texture is layered everywhere: fluted marble, patterned timber floors, artwork on canvas, mirrors that double the room's depth. Planting threads through the hard surfaces to keep the space alive and breathing, while low, directed light lets the split-marble figure and the charred timber ceiling carry the drama — the whole room tuned as a single, enveloping atmosphere rather than a collection of finishes. If the club draws, at root, on the old gymkhana — the members' room, the ceremony, the grandeur — it does so entirely through material rather than ornament. EPISODE Powai is that idea given a sharp, modern twist: a single room, one strong centre, and a palette of split marble, charred wood and steel worked hard enough to hold its own in the most demanding corner of the city.</p>

