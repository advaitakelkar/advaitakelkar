description: |
  <p>Dakughar sits in Palitana, the small Gujarati pilgrim town that gathers at the foot of Shatrunjaya — one of the holiest hills in Jainism, a mountain crowned by more than eight hundred marble temples and reached by some three and a half thousand carved steps. It is a place defined by ascent, by stone, and by a devotional stillness, famous as the first town in the world to declare itself entirely vegetarian. The house occupies a tight corner plot at the edge of this landscape, hemmed in on two sides by the street and opening, on the others, to long views of the low basalt hills and the temple ridge beyond. The brief was disarmingly simple — a compact home for a friend, built modestly, on very little ground — and the whole difficulty, and opportunity, lay in the constraint of the site itself.</p>
  <p>With almost no room to spread out, the house was conceived to grow upward rather than outward. Its rooms are stacked and wrapped around a slender central courtyard — a chowk drawn directly from the pol and wada houses of old Ahmedabad, where the introverted plan turns its back on the crowded street and organises life around a shared shaft of light and air. Here that courtyard becomes the lung of the section, pulling daylight deep into the plan and drawing the hot Saurashtra air up and out through the stack. Bridges and a mezzanine gallery cross the void, so the family lives around and across the courtyard as much as beside it, always aware of one another through the shared vertical space.</p>
  <p>Materiality was the heart of the project. The primary structure is built in load-bearing walls of local basalt — the same dark volcanic rock that litters the surrounding hills — laid so the house feels quarried from its own ground. Against this rough, grounded stone, panels of pigmented concrete are set as a deliberate foil: smooth, cast and consciously modern where the basalt is found and heavy. The two carry on a quiet conversation of contrasts throughout — the ancient against the made, the rubble against the monolith. Externally the house is wrapped in a taut metal facade, a single restrained skin that reads as one monolithic object from the street and holds the composition together.</p>
  <p>For all its introversion, the house keeps a generous public face. A raised veranda holds the street corner, and from it a timber jhula — a swing — hangs as an open invitation, an otla in the Gujarati tradition where the family can sit out through the warm evenings, sharing chai and nashto and conversation with neighbours and passers-by on the road below. It is the social hinge between the private courtyard within and the town without. Behind the metal skin, the interiors quietly fold in modern comfort — air-conditioning, contemporary services, a clean detail language — without surrendering the tactile, hand-built warmth of a traditional Indian home. Dakughar is, in the end, a small essay in doing more with less: local materials handled with a modern touch, a vertical house that borrows the intelligence of the courtyard and turns a difficult corner plot into a home rooted firmly in its place.</p>

