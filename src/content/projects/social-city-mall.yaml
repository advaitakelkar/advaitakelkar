description: |
  <p>Perched on the roof of South City Mall, this SOCIAL looks out over south Kolkata. The design centers on a central bar ringed by stepped seating, with contoured and telescoping tiers that give every table its own view of the room and the skyline beyond.</p>
  <p>Booth-lined VIP zones sit along the edges, catching cinematic views of the facade and the city behind it. Outside, a huge rooftop garden takes over, with long tables and community dining laid out to push people toward each other. At 16,000 square feet, in one of Kolkata's early high-rise commercial buildings, it was a major transformation of the roof into a full hospitality space.</p>

