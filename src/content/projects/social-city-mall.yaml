description: |
  <p>Located in South City Mall in Kolkata, this rooftop property offers views of South City. The design concept centers around a central bar with stepped seating layout throughout the space, incorporating contoured and telescopic seating to provide a unique viewpoint from all angles for the customers.</p>
  <p>Various VIP zones with boot seating on the edges provide cinematic views of the facade and the city skyline in the background. The venue features a massive outdoor space designed as a rooftop garden with long tables and community dining layouts to foster a social experience. As one of the early high-rise commercial properties of Kolkata, this design marks a major transformation into a massive 16,000 square foot hospitality space.</p>

