description: |
  <p>EPISODE occupies a bare-shell floor in Topsia, one of the fast-rising commercial quarters on the eastern edge of Kolkata — a raw, high-energy market district in the middle of transformation. The concept reached back into the city's colonial memory: the Anglo-Indian gymkhana, the members' club of the Raj, of which Kolkata once had even more than Bombay. The idea was unapologetic — the Raj is back — and the design set out to conjure that world of empire, ceremony and clubroom grandeur, remixed for a contemporary crowd. From an empty commercial shell, the interior was cut into a sequence of distinct rooms, each a different chamber of the club, unfolding one into the next.</p>
  <p>At the centre lies the ballroom, the club's beating heart. Its floor, walls and DJ console are wrapped in a single dark blue-black terrazzo, hand-charged with metal inlays and with chips of Indian marble and marble dust of varied sizes scattered through it in a deliberate, composed rhythm. Four monolithic booths anchor the corners around a high-energy central floor. Above the terrazzo dado the walls step up in teak mouldings finished in linseed oil, then into a lime-plaster surface threaded with fine brass patti inlays, and finally into mirrors and graphic panels that lift and lighten the room. At one end a giant living green wall breathes into the space — a tropical note of growth against all the stone and metal.</p>
  <p>The ballroom is wrapped by a bespoke metal partition: a three-panel screen system combining fluted, ribbed glass with a textured metal jali. It filters light and view between the club's inner sanctum and the rooms that surround it, dissolving hard walls into a play of ribbed translucency and shadow. It is the device that holds the whole plan together, letting each chamber borrow atmosphere from the next without ever fully opening to it. Around this core runs a sequence of quieter rooms. The veranda is a long, semi-outdoor smoking lounge floored in white terrazzo, inlaid with squares of black Indian marble chip and edged in marble borders; its walls carry the same pale terrazzo, stepped timber detailing and a deep, royal maroon-red texture that lends the room its imperial warmth. A dedicated smoke room repeats this language as an open-air retreat, its floor shifting to the ballroom's darker terrazzo. Beyond them, the chambers offer a private, non-smoking dining room — soft sofa seating for a family of twelve, intimate and removed from the energy of the floor.</p>
  <p>The sequence culminates in the taproom, a royal bar built around a genuine invention: cocktails served on tap. A microbrewery at the back dispenses bespoke house cocktails — 'Tap Tales' — in place of the usual beer. The bar itself is a forty-foot leather-faced curve, topped with a twin brass rail and crowned by a custom cage of brass, timber and glass, its corner junctions detailed with glass spheres. Throughout EPISODE, a tight, recurring palette — terrazzo, teak, brass, marble, ribbed glass and living green — stages a restrained, contemporary echo of colonial grandeur: the gymkhana not restored but reimagined, empire filtered through a modern, material eye.</p>

