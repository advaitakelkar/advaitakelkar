description: |
  <p>A speculative design study rethinking the spatial conditions of urban sleeping for unhoused populations in Mumbai. The study asks a blunt question: if the city already houses people on its streets, what would it take to do so with dignity? The pods are an attempt at an answer, compact shelter treated as civic infrastructure rather than an afterthought.</p>

