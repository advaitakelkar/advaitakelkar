description: |
  <p>We were approached by XXL Collective to design the food court layout for Terminal 1 (T1) of the Mumbai Airport. The core design concept integrates an actual, decommissioned double-decker Mumbai public bus sourced from a residential school in South Mumbai, creating a central design centerpiece.</p>
  <p>The layout surrounds this historic bus with step seating resembling an amphitheater structure, allowing travelers coming into the food court to be hosted in a unique dining environment. Built efficiently out of modular cargo containers, the final design proposal is a collaborative blend between XXL Collective's visual graphic work and our architectural studio's spatial planning.</p>
