description: |
  <p>XXL Collective approached us to design the food court layout for Terminal 1 of Mumbai Airport. At its center sits the real thing: a decommissioned double-decker Mumbai public bus, sourced from a residential school in South Mumbai and given a second life as the room's centerpiece.</p>
  <p>Amphitheater-style step seating wraps around the bus, turning the food court into a place travelers actually want to linger rather than pass through. The whole build uses modular cargo containers, with XXL Collective's graphic work layered over our studio's spatial planning.</p>
