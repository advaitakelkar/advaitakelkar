description: |
  <p>I grew up in Bombay, the birthplace of Bollywood, watching Western films alongside Hindi ones, and I've always been curious how the two cinematic worlds would adapt to each other. Mafia movies felt like the right place to start: The Godfather and Gangs of Wasseypur are landmarks of the same genre on opposite sides of the world. This experiment recasts iconic Hollywood characters with the drama, grit, and raw emotion of a Bollywood masala film, using AI to give each one a new look and a new life.</p>
  
