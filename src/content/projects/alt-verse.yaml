description: |
  <p>Being from Bombay, birthplace of Bollywood and growing with a western culture, I've always been curious of how different cinematic experiences would adapt within each other. I've been fascinated with mafia movies and the Godfather and Gangs of Wasseypur are two theatres in these genres in Hollywood and Bollywood. This experiment started with that of creating these characters, the image to create a look and emotion in them expressing drama and real life emotions.</p>
  
