description: |
  <p>Since childhood, I have been fascinated by the mythos of superheroes—the universes of Marvel, X-Men, and DC. This project is a tribute to that early obsession, reimagined through generative design. Each playing card is born from a customized prompt, weaving character-specific characteristics into the ornate structure of a classic deck. It is an exploration of superhero storytelling, framed within the physical limits of a card face.</p>
  
  <div class="prompt-box">
    <div class="prompt-header">
      <span class="prompt-header-title">Midjourney Prompt</span>
      <button class="copy-prompt-btn" aria-label="Copy prompt">
        <svg class="copy-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        <span class="copy-btn-text">Copy</span>
      </button>
    </div>
    <div class="prompt-body">
      <span class="prompt-text">"A vintage playing card illustration of [Super Character Name], highly detailed comic book style, tarot card border, ornate details, symbol, vibrant colors, clean lines, cinematic lighting --ar 57:88"</span>
    </div>
  </div>

  <div class="deck-logos-container">
    <span class="deck-logos-title">Logos used:</span>
    <div class="deck-logos-row">
      <span class="deck-logo-item" style="--logo: url('/images/logos/batman.png')" title="Batman / Gotham"></span>
      <span class="deck-logo-item" style="--logo: url('/images/logos/superman.png')" title="Superman"></span>
      <span class="deck-logo-item" style="--logo: url('/images/logos/flash.png')" title="The Flash"></span>
      <span class="deck-logo-item" style="--logo: url('/images/logos/green-lantern.png')" title="Green Lantern"></span>
      <span class="deck-logo-item" style="--logo: url('/images/logos/avengers.png')" title="Avengers / Marvel"></span>
      <span class="deck-logo-item" style="--logo: url('/images/logos/xmen.png')" title="X-Men"></span>
      <span class="deck-logo-item" style="--logo: url('/images/logos/dc.png')" title="DC Comics"></span>
    </div>
  </div>

  <p style="margin-top: 16px; font-size: var(--_tokens---type--micro); color: var(--_tokens---color--muted);">
    <em>Characters in this study: Captain America, Cyborg, Dr. Freeze, Emma Frost, Green Lantern, Jean Grey, Magneto, Martian Manhunter, Penguin, Scarlet Witch, Winter Soldier, Wonder Woman, Batman, Cyclops, Flash, Gambit, Hulk, Joker, Loki, Nightcrawler, Poison Ivy, Professor X, Spider-Man, Storm, Superman, Wolverine.</em>
  </p>
