description: |
  <p>Dance has always been inseparable from the rooms it happens in — the ballroom, the disco, the street. This experiment uses generative AI to push each of these dance cultures forward in time, imagining the dancers, the fashion and the architecture of their future forms. Each series takes a single style and treats costume, movement and spatial styling as one continuous design problem, asking what these rituals of the body might look like generations from now.</p>

