description: |
  <p>SOCIAL Vashi is an experiment in brick. Working under the concept of 'a ruin in motion,' we explored brickwork of every kind, with hand-cut bricks and tiles applied to the walls to create a rustic, weathered effect under custom lighting.</p>
  <p>The interior brings together custom-molded steel furniture, stepped seating details, and a corten steel facade, all of it aging on purpose. Underfoot is monolithic stone flooring; the bar is carved from stone and topped in metal. Throughout the space, cast concrete pours and brick bond details were iterated again and again until the ruin felt right.</p>

