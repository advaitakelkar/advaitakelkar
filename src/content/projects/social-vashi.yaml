description: |
  <p>SOCIAL Vashi was an experimentation with brick materiality, exploring various types of brickwork under the concept of 'a ruin in motion'. The project features custom lighting and hand-cut bricks and tiles applied to walls to create a rustic, weathered effect.</p>
  <p>The interior integrates custom-molded steel furniture, custom lights, stepped seating details, and a corten steel facade to produce a unique historical character. It features monolithic stone flooring, a passive bar carved out of stone with a metal top, and multiple detailed iterations of cast concrete pouring and intricate brick bond detailing throughout the space.</p>

