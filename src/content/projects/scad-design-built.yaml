chapters:
  - title: "Lonely"
    subtitle: "Living with Loneliness"
    body: "<div class=\"ch-hero\"><img src=\"/images/scad-design-built/lonely/hero.jpg\" alt=\"\" loading=\"lazy\"></div><p class=\"ch-statement\">People are more reachable than ever, yet constant communication has not translated into deeper relationships. Americans spend almost seven hours a day on screens, while messages, updates, notifications, and remote forms of interaction increasingly shape how people work, socialize, relax, shop, and move through daily life. DesignBuild aims to transform everyday environments into spaces that support presence, participation, and repeated social exchange.</p><div class=\"ch-text\"><p>Technology has made daily life faster and more convenient, but it has also made many routines more private. A conversation becomes a text, a gathering becomes a group chat, a meal becomes a delivery order, an errand becomes an app, and free time becomes streaming. These habits keep people in contact, but they do not always create the familiarity, trust, or shared experience that sustained in-person interaction provides.</p><p>As more activities move through personal devices, the ordinary moments where people pause, linger, and meet one another become easier to lose. Public waiting becomes scrolling, shared meals become individual orders, and casual conversations become short replies. Over time, loneliness becomes embedded within routine, not because people are completely alone, but because meaningful interaction becomes harder to sustain.</p><p>In Savannah, digital loneliness is shaped by student life, tourism, remote work, and increasingly app-based routines. Students move between classes, jobs, housing, and screens, while tourists often experience the city through phones as much as direct interaction. At the same time, Savannah already contains a strong culture of gathering through its squares, porches, parks, sidewalks, and neighborhood streets. The challenge is not the absence of public space, but how to activate it in ways that compete with the convenience and privacy of digital life.</p></div><p class=\"ch-stat\">Americans ages 15\u201329 spend 45% more time alone than they did in 2010.<small>American Time Use Survey</small></p><div class=\"ch-int\"><div><h4>The In Between Table</h4><p class=\"ch-int__tagline\">Shared Ground: Design for Pause in Everyday Circulation</p><p class=\"ch-int__desc\">High-traffic spaces often encourage people to pass through without interacting. A permanent harvest table fills gaps between buildings and creates a shared destination for gathering, working, and pausing. Integrated lighting, charging, and sightlines support longer use and turn circulation space into a more social environment.</p><ul class=\"ch-areas\"><li><span>Social Areas</span><span>300 sf</span></li><li><span>Integrated Seating</span><span>70 sf</span></li><li><span>Shade Canopy</span><span>60 sf</span></li><li><span>Charging Station</span><span>40 sf</span></li><li><span>Work Surface</span><span>200 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>670 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/lonely/i1.png\" alt=\"The In Between Table \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/lonely/c1a.png\" alt=\"The In Between Table \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Pop-Up Block Party</h4><p class=\"ch-int__tagline\">Design for Spontaneous Gathering</p><p class=\"ch-int__desc\">Open lots and transit zones often lack elements that support social interaction. A deployable mobile social hub activates underused spaces with communal seating, a shared grill, and flexible infrastructure that encourages people to stop and connect. Rather than sitting empty, these areas become active destinations for public life.</p><ul class=\"ch-areas\"><li><span>Covered Gathering</span><span>180 sf</span></li><li><span>Seating</span><span>120 sf</span></li><li><span>Grill / Food Prep</span><span>70 sf</span></li><li><span>Flexible / Activity</span><span>90 sf</span></li><li><span>Storage</span><span>120 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>580 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/lonely/I2.png\" alt=\"Pop-Up Block Party \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/lonely/c2a.png\" alt=\"Pop-Up Block Party \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Treehouse Commons</h4><p class=\"ch-int__tagline\">Design for Connection</p><p class=\"ch-int__desc\">The Treehouse Commons is a retreat from constant digital engagement, a space for reflection, conversation, and shared experience deeply rooted in nature. Elevated within the landscape, it fosters slower, more intentional ways of working that prioritize presence, creativity, and genuine human connection.</p><ul class=\"ch-areas\"><li><span>Elevated Pod</span><span>220 sf</span></li><li><span>Reflection Deck</span><span>180 sf</span></li><li><span>Gathering Platform</span><span>220 sf</span></li><li><span>Indoor Reading Area</span><span>180 sf</span></li><li><span>Circulation</span><span>300 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>1100 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/lonely/I3.png\" alt=\"Treehouse Commons \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/lonely/c3a.png\" alt=\"Treehouse Commons \u2014 render\" loading=\"lazy\"></div></div>"
  - title: "Food"
    subtitle: "Living with Food Insecurity"
    body: "<div class=\"ch-hero\"><img src=\"/images/scad-design-built/food/hero.jpg\" alt=\"\" loading=\"lazy\"></div><p class=\"ch-statement\">In the United States, 1 in 7 households experiences food insecurity, even as food production remains high, pointing to a gap between availability and access. Through porch-side aeroponic units and mobile kitchen classrooms that transform underutilized spaces into productive, self-sustaining hubs for high-quality nutrition and culinary autonomy.</p><div class=\"ch-text\"><p>Access to nutritious food remains uneven despite an abundant supply. The U.S. Department of Agriculture classifies a food desert as \u201ca low-income census tract with limited access to affordable, nutritious food.\u201d Today, an estimated 735 million people face chronic hunger, while nearly 2.4 billion people do not have consistent access to enough safe and nutritious food. In a world that throws out a third of all food produced each year, these numbers reveal a stark imbalance driven by poverty, climate change, conflict, and systemic inequality.</p><p>Food deserts are not created by a lack of consumer demand, but by systemic decisions in how food systems are structured. Large grocery chains often avoid investing in low-income or underserved areas due to perceived lower profit margins, higher security risks, and logistical challenges. As a result, communities most in need are left without access to fresh and affordable food.</p><p>In Savannah, food access issues are clearly visible across specific neighborhoods. Areas such as West Savannah, Carver Heights, and parts of Eastside Savannah have limited access to full-service grocery stores, with many residents relying on convenience stores or fast food chains instead. In neighborhoods where car ownership is lower and public transit is less efficient, this distance becomes a real barrier.</p></div><p class=\"ch-stat\">45% of Savannah residents live over a mile from a full service grocery store.<small>USDA Economic Research Service</small></p><div class=\"ch-int\"><div><h4>Porch-Side Aeroponics</h4><p class=\"ch-int__tagline\">Feeding the Neighborhood: Design for a Healthier Community</p><p class=\"ch-int__desc\">Limited space and access often make growing food at home difficult in dense residential settings. A lightweight modular vertical growing unit fits on porches and shared landings, bringing food production into everyday domestic space without requiring a yard while making fresh food more visible and accessible.</p><ul class=\"ch-areas\"><li><span>Vertical Grow Unit</span><span>10 sf</span></li><li><span>Maintenance Zone</span><span>5 sf</span></li><li><span>Water Tank</span><span>2 sf</span></li><li><span>Seedling Shelf</span><span>5 sf</span></li><li><span>Harvest Space</span><span>8 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>30 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/food/F1.png\" alt=\"Porch-Side Aeroponics \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/food/f1a.png\" alt=\"Porch-Side Aeroponics \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Community Kitchen Classroom</h4><p class=\"ch-int__tagline\">A Community Food Network</p><p class=\"ch-int__desc\">Many neighborhoods lack reliable access to fresh food and the resources to preserve it. A deployable mobile kitchen travels to underserved areas and community spaces, creating a hands-on setting for food preservation and education. Residents learn to dry, can, and store food, building practical skills and stronger food autonomy.</p><ul class=\"ch-areas\"><li><span>Demonstration Area</span><span>150 sf</span></li><li><span>Dry Pantry</span><span>30 sf</span></li><li><span>Cold Storage</span><span>20 sf</span></li><li><span>Equipment Storage</span><span>20 sf</span></li><li><span>Sink</span><span>20 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>240 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/food/F2.png\" alt=\"Community Kitchen Classroom \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/food/f2a.png\" alt=\"Community Kitchen Classroom \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Agriculture Facade</h4><p class=\"ch-int__tagline\">The City Pantry: Food as Community Infrastructure</p><p class=\"ch-int__desc\">Urban areas often contain underused infrastructure while access to fresh food remains uneven. An existing parking structure is retrofitted with an automated vertical farm and graywater filtration system, transforming car-centered space into high-density food production and expanding access to fresh produce.</p><ul class=\"ch-areas\"><li><span>Vertical Farm Area</span><span>400 sf</span></li><li><span>Maintenance Access</span><span>200 sf</span></li><li><span>Harvesting Area</span><span>300 sf</span></li><li><span>Water Filtration</span><span>160 sf</span></li><li><span>Equipment Storage</span><span>50 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>1110 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/food/F3.png\" alt=\"Agriculture Facade \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/food/f3a.png\" alt=\"Agriculture Facade \u2014 render\" loading=\"lazy\"></div></div>"
  - title: "Heat"
    subtitle: "Living with Extreme Heat"
    body: "<div class=\"ch-hero\"><img src=\"/images/scad-design-built/heat/hero.jpg\" alt=\"\" loading=\"lazy\"></div><p class=\"ch-statement\">Extreme heat shapes everyday life in direct and tangible ways, not just in how it feels but in how the city functions. In the United States, heat already kills more people each year than hurricanes, tornadoes, and floods combined, and globally it is responsible for approximately 500,000 deaths annually. DesignBuild aims to transform overheated public spaces into safe, comfortable environments.</p><div class=\"ch-text\"><p>Extreme heat is rapidly redefining the parameters of human habitability. As global temperatures accelerate, the increasing frequency of high-humidity thermal events is pushing the human body toward its physiological threshold. This is the critical point at which evaporative cooling through perspiration becomes ineffective. Once considered anomalous, these conditions are now transitioning into seasonal norms.</p><p>In Savannah, these challenges are exacerbated by a combination of coastal proximity, low elevation, and persistent humidity. The surrounding warm waters consistently saturate the air with moisture, while the flat topography encourages thermal stagnation. Consequently, outdoor environments remain perpetually taxing, making prolonged exposure increasingly unsustainable and establishing the city as a primary site of vulnerability within a warming climate.</p><p>Shading, airflow, and vegetation remain essential strategies, but on their own they are no longer sufficient to address the intensity and duration of today\u2019s extreme heat conditions. As extreme heat intensifies, architecture is transitioning beyond traditional passive strategies toward systems that actively reduce, reflect, and dissipate thermal energy.</p></div><p class=\"ch-stat\">\u201cWe built our world for a climate that no longer exists\u201d<small>Elizabeth Kolbert \u2014 Pulitzer Prize winning American journalist</small></p><div class=\"ch-context\"><img src=\"/images/scad-design-built/heat/collage-1.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/collage-2.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/collage-3.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/context-ac.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/context-1.jpg\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/context-2.jpg\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/context-map.jpg\" alt=\"\" loading=\"lazy\"></div><div class=\"ch-int\"><div><h4>Shade Haven</h4><p class=\"ch-int__tagline\">Cooling the City: Design for a Warmer World</p><p class=\"ch-int__desc\">Transportation nodes, often lacking adequate shading, become sites of prolonged thermal exposure. By introducing climate-responsive sheltering systems and vegetative layers that facilitate evaporative cooling, these spaces are transformed into thermally moderated environments that support prolonged occupation.</p><ul class=\"ch-areas\"><li><span>Covered Waiting</span><span>30 sf</span></li><li><span>Standing Area</span><span>20 sf</span></li><li><span>Bench Seating</span><span>20 sf</span></li><li><span>Clear Boarding Zone</span><span>20 sf</span></li><li><span>Planter / Vegetation</span><span>10 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>100 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/heat/H1_1.png\" alt=\"Shade Haven \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/h1b.png\" alt=\"Shade Haven \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Cooling Oasis</h4><p class=\"ch-int__tagline\">Cooler Design for Climate Change</p><p class=\"ch-int__desc\">A shaded gathering space uses a tree-integrated canopy to create refuge in exposed areas. The circular structure wraps around vegetation, combining shade, seating, and social space into one intervention. By strengthening the tree as infrastructure and anchor, the space supports rest, conversation, and heat relief.</p><ul class=\"ch-areas\"><li><span>Gathering Platform</span><span>250 sf</span></li><li><span>Observation Deck</span><span>180 sf</span></li><li><span>Indoor Retreat Space</span><span>140 sf</span></li><li><span>Canopy Walkway</span><span>160 sf</span></li><li><span>Integrated Seating</span><span>100 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>830 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/heat/H2_1.png\" alt=\"Cooling Oasis \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/h2b.png\" alt=\"Cooling Oasis \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Urban Canopy</h4><p class=\"ch-int__tagline\">Urban Cooling for a Warmer Savannah</p><p class=\"ch-int__desc\">A permanent cooling station uses high-tech artificial tree forms to provide shade, collect atmospheric moisture, and release evaporative cooling. The intervention brings heat relief into places where natural shade is limited or absent, making public space more habitable. Exposed urban spaces lack tree canopy and cooling infrastructure.</p><ul class=\"ch-areas\"><li><span>Central Shaded Area</span><span>200 sf</span></li><li><span>Artificial Tree Area</span><span>100 sf</span></li><li><span>Seating Area</span><span>80 sf</span></li><li><span>Open Circulation</span><span>100 sf</span></li><li><span>Mist Cooling Area</span><span>70 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>550 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/heat/H3_1.png\" alt=\"Urban Canopy \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/heat/h3b.png\" alt=\"Urban Canopy \u2014 render\" loading=\"lazy\"></div></div>"
  - title: "Climate"
    subtitle: "Living with Climate Migration"
    body: "<div class=\"ch-hero\"><img src=\"/images/scad-design-built/climate/hero.png\" alt=\"\" loading=\"lazy\"></div><p class=\"ch-statement\">In 2022, weather-related disasters displaced more than thirty two million people globally. Through modular, energy-positive dwellings designed for disassembly and relocation that transform vulnerable, flood-prone sites into stable, resilient residential networks even as the environment changes.</p><div class=\"ch-text\"><p>When large numbers of people are forced to leave their homes quickly, it becomes migration. These movements are often sudden and unplanned, shifting people from familiar neighborhoods into temporary or unfamiliar settings. As these events increase in frequency and intensity, displacement is no longer temporary or isolated, and rebuilding timelines extend for years, requiring people to live in interim conditions while their communities recover.</p><p>After a disaster destroys housing, rebuilding is rarely immediate. After Hurricane Katrina struck the Gulf Coast in 2005, more than 800,000 homes were damaged or destroyed. Many families spent years moving between temporary trailers, rented apartments in other states, or living with relatives while waiting for insurance claims, federal assistance, and reconstruction to move forward.</p><p>In August 2024, heavy rainfall and river flooding associated with Hurricane Debby pushed the nearby Ogeechee River well above flood stage. Neighborhoods in and around Richmond Hill began taking on water, particularly in low-lying areas near the river and marshlands. Flooding in coastal areas often leads to temporary displacement, which can increase the immediate demand for short-term housing and resources in neighboring inland cities.</p></div><p class=\"ch-stat\">22 million people are displaced annually by sudden weather events.<small>UN Office for Disaster Risk Reduction</small></p><div class=\"ch-context\"><img src=\"/images/scad-design-built/climate/collage-1.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/climate/collage-2.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/climate/collage-3.png\" alt=\"\" loading=\"lazy\"><img src=\"/images/scad-design-built/climate/context-katrina.jpg\" alt=\"\" loading=\"lazy\"></div><div class=\"ch-int\"><div><h4>Arrival Hub</h4><p class=\"ch-int__tagline\">Welcome Home: Design for Climate Migration</p><p class=\"ch-int__desc\">Climate migration often brings people into cities unprepared. An arrival hub provides a point of entry where individuals can access essential services, supporting needs such as registration, health check-ups, rest, and information. Located in accessible areas, it acts as a first layer of stability, helping migrants transition into the city.</p><ul class=\"ch-areas\"><li><span>Entrance / Info</span><span>100 sf</span></li><li><span>Waiting / Rest</span><span>100 sf</span></li><li><span>Health Check Nook</span><span>50 sf</span></li><li><span>Utility Area</span><span>30 sf</span></li><li><span>Circulation</span><span>50 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>330 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/climate/M1.png\" alt=\"Arrival Hub \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/climate/w1b.png\" alt=\"Arrival Hub \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Community Resource Station</h4><p class=\"ch-int__tagline\">Places to Belong: Architecture for Climate Migration</p><p class=\"ch-int__desc\">Displaced communities often lose access to essential services and shared gathering space after a storm. A modular mobile pavilion provides clean water, power, food, and wifi while creating a central place to gather and reconnect. Rebuilding community sparks recovery needs with a sense of place and comfort during displacement.</p><ul class=\"ch-areas\"><li><span>Covered Gathering</span><span>350 sf</span></li><li><span>Water Distribution</span><span>20 sf</span></li><li><span>Food Pantry</span><span>40 sf</span></li><li><span>Wifi Communication</span><span>40 sf</span></li><li><span>Storage</span><span>50 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>500 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/climate/M2.png\" alt=\"Community Resource Station \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/climate/w2b.png\" alt=\"Community Resource Station \u2014 render\" loading=\"lazy\"></div></div><div class=\"ch-int\"><div><h4>Mobile Resilience Housing</h4><p class=\"ch-int__tagline\">Displaced, Not Forgotten</p><p class=\"ch-int__desc\">Rather than treating retreat as loss, the project frames housing as mobile adaptation. Rising sea levels and flooding make permanent settlement difficult. A solar-powered, energy-positive modular dwelling built from mass timber is designed for disassembly and relocation, allowing housing to move as conditions change.</p><ul class=\"ch-areas\"><li><span>Living Area / Porch</span><span>300 sf</span></li><li><span>Sleeping Area</span><span>150 sf</span></li><li><span>Kitchen</span><span>80 sf</span></li><li><span>Bathroom</span><span>50 sf</span></li><li><span>Storage / Mechanical</span><span>70 sf</span></li><li class=\"ch-areas__total\"><span>Total</span><span>650 sf</span></li></ul></div><div class=\"ch-int__imgs\"><img src=\"/images/scad-design-built/climate/M3.png\" alt=\"Mobile Resilience Housing \u2014 concept sketch\" loading=\"lazy\"><img src=\"/images/scad-design-built/climate/w3b.png\" alt=\"Mobile Resilience Housing \u2014 render\" loading=\"lazy\"></div></div>"
