description: |
  <p>DesignBuild examines how design can respond to four conditions reshaping everyday life — loneliness, food insecurity, extreme heat, and climate migration — through twelve buildable interventions for Savannah.</p>
  <p>Each chapter below moves from research to intervention: the condition as it is lived, its impact on Savannah, and three design-build proposals with concept sketches, renders, and space programs.</p>

