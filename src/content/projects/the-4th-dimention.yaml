description: |
  <p>T4D (The 4th Dimension) is a research project by the ARCHV collective investigating how flat 2D planes intersect, fold, and connect to generate complex 3D forms. The study worked through drawings and physical models, treating geometry as a shared sandbox for the four of us rather than any one person's design problem.</p>

