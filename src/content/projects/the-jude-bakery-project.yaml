description: |
  <p>St. Jude Bakery is a redevelopment idea for a historic Mumbai bakery: an invite-only diner upstairs, with the small working bakery kept alive below. The aim was to reclaim the old building without losing its original character, turning the experimental kitchen on top into a venue for secret chef dinners.</p>
  <p>Our intervention began at the roof, where a translucent polycarbonate mesh lets the outside in and makes the upper floor feel almost like a greenhouse, while the original bakery foundation stays intact. Inside we added an open bar, an open kitchen where food is prepared in front of the guests, a small wine store with an overhead holding rack, and a single long dining table where everyone gathers.</p>
