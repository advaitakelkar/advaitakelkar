description: |
  <p>Located in a historic bakery, St. Jude Bakery was a redevelopment idea of an invite-only diner with a small bakery at the bottom. The idea was to reclaim the old bakery while maintaining its original vibe, with an experimental small kitchen on top acting as a venue for secret chef dinners.</p>
  <p>Our intervention started by reclaiming the original roof and adding a translucent polycarbonate mesh on top to bring in the outside environment, making it feel almost like a greenhouse while keeping the original bakery foundation intact. We created an open bar, an open kitchen where food is preserved live, kitchen stations, a small wine storage area with an overhead wine holding rack, and a single dining table where sitters can gather.</p>
