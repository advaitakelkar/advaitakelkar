description: |
  <p>Commissioned for a luxury residence on Mumbai’s prestigious World Seaface, SHELF is an ode to the city’s rich history and its underbelly—where hidden objects hold stories of intrinsic value. This project was an attempt to curate a library of offbeat antiques and artifacts that embody Mumbai’s past and urban life.</p>
  <p>Objects were sourced from the legendary Chor Bazaar, or Thieves’ Alley, uncovering pieces of unique significance. Coupled with handcrafted elements and abstract artworks, the composition became a curated narrative that satisfied the client’s deep curiosity. Driven by the client’s passion for creating a one-of-a-kind art piece, SHELF allowed us to push the boundaries of art and sculpture. Through meticulous iterations and collaborative discussions, we crafted a truly unique and personal installation.</p>
