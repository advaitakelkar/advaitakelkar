description: |
  <p>Commissioned for a residence on Mumbai's Worli Sea Face, SHELF is an ode to the city's history and its underbelly, where hidden objects carry stories of their own. The project set out to curate a library of offbeat antiques and artifacts that embody Mumbai's past and its street life.</p>
  <p>We sourced pieces from the legendary Chor Bazaar, the city's 'thieves' market,' hunting for objects with real character, then paired them with handcrafted elements and abstract artworks. The client wanted something one of a kind and stayed closely involved, so the composition took shape through many iterations and long conversations. Created with Nayan Mote of NMS Studio, the result is an installation as personal as the city it draws from.</p>
