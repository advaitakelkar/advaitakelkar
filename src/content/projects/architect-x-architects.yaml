description: |
  <div class="desc-scroll">
    <p>As a student of architecture, architects themselves have always fascinated me. Each one has a signature: a way of detailing, a material palette, a geometry you can spot from across the street. This experiment asks what happens when two of those signatures collide. I pair architects at random, ones who would likely never have met, and let AI imagine the building they might have designed together.</p>
    <p style="margin-top: 16px; font-size: var(--_tokens---type--micro); color: var(--_tokens---color--muted);">
    <em>Architects in this study: Zaha Hadid, Peter Zumthor, Antoni Gaudí, Santiago Calatrava, Bjarke Ingels, Thomas Heatherwick, Carlo Scarpa, Roberto Burle Marx, Frank Gehry, Le Corbusier, Frank Lloyd Wright, Alvar Aalto, Kengo Kuma, Eric Owen Moss, Mies van der Rohe, Junya Ishigami, Studio Mumbai, Charles Correa.</em>
  </p>
  </div>

