description: |
  <p>Inspired by the iconic landscape architecture of Roberto Burle Marx, this project is a graphic homage to his famous abstract landscape paintings and ground plans which became living dreams. The final graphic designs adapt his organic landscape shapes into a set of custom multi-colored stickers designed to be pasted in urban spots across various travel destinations.</p>
