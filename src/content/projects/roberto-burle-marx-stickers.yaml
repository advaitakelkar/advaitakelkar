description: |
  <p>A graphic homage to the landscape architect Roberto Burle Marx, whose abstract paintings and ground plans famously became living gardens. The designs adapt his organic landscape shapes into a set of custom multicolored stickers, made to be pasted in urban spots across various travel destinations, small pieces of his landscapes escaping into other cities.</p>
