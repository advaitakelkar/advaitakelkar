description: |
  <p>RFLCT is a self-funded, mirrored tetrahedral light sculpture created for the Celebrate Bandra art festival. Set among the festival crowds, its mirrored faces caught the street and the people passing through, reflecting the neighborhood back at itself.</p>
  <p>Built with Sneha Desai, Varun Mehta, and Nayan Mote, this was the installation that pulled the four of us together and set ARCHV in motion.</p>

