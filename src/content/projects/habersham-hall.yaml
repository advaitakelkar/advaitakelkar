  - title: "Unveil"
    subtitle: "Chrysalis Unveil"
    body: "<div class=\"ch-hero\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/A1.png\" alt=\"Unveil — exterior render\" loading=\"lazy\"></div><p class=\"ch-statement\">A design-build intervention at Habersham Hall that re-imagines the building's threshold as a spatial experience of arrival, transition, and revelation.</p><div class=\"ch-context\"><img src=\"/images/habersham-hall/UNVEIL/DIAGRAMS/Entry Diagram-02-05.png\" alt=\"Entry diagram\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/Diagram 01.png\" alt=\"Diagram 01\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/Diagram 02.png\" alt=\"Diagram 02\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/Diagram 03.png\" alt=\"Diagram 03\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/Diagram 04.png\" alt=\"Diagram 04\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/ARCH577_02_UNVEIL_Plans_V2_First Floor Plan.png\" alt=\"First Floor Plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/ARCH577_02_UNVEIL_Plans_V2_Second Floor Plan.png\" alt=\"Second Floor Plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/ARCH577_02_UNVEIL_Plans_V2_Third Floor Plan.png\" alt=\"Third Floor Plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/ARCH577_02_UNVEIL_Plans_V2_Rooftop Plan.png\" alt=\"Rooftop Plan\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/UNVEIL/PLANSSECTIONS/SECTION-WIDE-LV.jpg\" alt=\"Section — wide\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/A2.png\" alt=\"Unveil — render 2\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/A3.png\" alt=\"Unveil — render 3\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/A4.png\" alt=\"Unveil — render 4\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/I1.png\" alt=\"Unveil — interior\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/c2394c6ba43c94e8eba1557764fff738facfdca730859eb009f570a744c296ed.png\" alt=\"Unveil — render 5\" loading=\"lazy\"><img src=\"/images/habersham-hall/UNVEIL/RENDERS/cce42f8f4ad8ba9a19e2ade4c5cddc204b73da3ffaef39ae7e18a7d855d4cbf6.png\" alt=\"Unveil — render 6\" loading=\"lazy\"></div>"
