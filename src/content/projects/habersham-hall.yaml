chapters:
  - title: "Unveil"
    subtitle: "Chrysalis Unveil"
    body: "<div class=\"ch-hero\"><img src=\"/images/habersham-hall/unveil/renders/a1.png\" alt=\"Unveil — exterior render\" loading=\"lazy\"></div><p class=\"ch-statement\">A design-build intervention at Habersham Hall that re-imagines the building's threshold as a spatial experience of arrival, transition, and revelation.</p><div class=\"ch-context\"><img src=\"/images/habersham-hall/unveil/diagrams/entry-diagram.png\" alt=\"Entry diagram\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/diagrams/diagram-01.png\" alt=\"Diagram 01\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/diagrams/diagram-02.png\" alt=\"Diagram 02\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/diagrams/diagram-03.png\" alt=\"Diagram 03\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/diagrams/diagram-04.png\" alt=\"Diagram 04\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/unveil/planssections/first-floor-plan.png\" alt=\"First Floor Plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/planssections/second-floor-plan.png\" alt=\"Second Floor Plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/planssections/third-floor-plan.png\" alt=\"Third Floor Plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/planssections/rooftop-plan.png\" alt=\"Rooftop Plan\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/unveil/planssections/section-wide.jpg\" alt=\"Section — wide\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/unveil/renders/a2.png\" alt=\"Unveil — render 2\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/renders/a3.png\" alt=\"Unveil — render 3\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/renders/a4.png\" alt=\"Unveil — render 4\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/renders/i1.png\" alt=\"Unveil — interior\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/renders/render-5.png\" alt=\"Unveil — render 5\" loading=\"lazy\"><img src=\"/images/habersham-hall/unveil/renders/render-6.png\" alt=\"Unveil — render 6\" loading=\"lazy\"></div>"
  - title: "Float"
    subtitle: "Habersham Float"
    body: "<div class=\"ch-hero\"><img src=\"/images/habersham-hall/float/renders/cover.png\" alt=\"Float — suspended hall over the flooded courtyard\" loading=\"lazy\"></div><p class=\"ch-statement\">By letting the ground floor of Habersham Hall be reclaimed by water, Float models a future where the building cohabitates with the rising sea — a &ldquo;Healing Envelope&rdquo; wrapped around a &ldquo;Floating Volume&rdquo; suspended above a reflecting pool.</p><div class=\"ch-text\"><p>Habersham Hall is a Moorish Revival stucco building from the 1800s — the former Chatham County jail, with 27 cells framing a 5,250 sq ft open-air courtyard beneath its iconic onion-shaped dome. Float turns that courtyard into a controlled flood: a recessed reflecting pool that doubles as stormwater retention and greywater reuse, transparent about the site's vulnerability to sea-level rise rather than resisting it. Above the water, a 200-seat auditorium reads as a vessel, floating clear of the jail's footprint — a literal and symbolic reintegration, lifting a communal, civic program above the ground that once represented confinement.</p><p>The intervention is built on a 27-foot modular sub-grid derived from the jail's existing 14-foot structural bays, carried by mass-timber trusses reinforced with steel tie rods to clear a column-free 48-foot span. A transparent double-skin envelope stands five feet off the historic walls on its own foundation, using that cavity as a stack-ventilation buffer with operable nana-wall glazing, while an exterior scrim shades a glazed gable roof that references the original tower's silhouette. Perforated wood panels and glass floor details carry the water motif into the interior, and the whole assembly is engineered so the historic masonry is never touched — a new building suspended entirely within the old one.</p></div><p class=\"ch-stat\">200-seat auditorium, suspended over a flooded courtyard on a column-free 48-foot span.<small>ARCH 577 — Design Build I, SCAD</small></p><div class=\"ch-context\"><img src=\"/images/habersham-hall/float/diagrams/concept-one-building-within-another.png\" alt=\"Float — one building within another, the Healing Envelope\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/diagrams/concept-site-sketch.png\" alt=\"Float — site sketch\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/diagrams/concept-gather-entry-present-reflect.png\" alt=\"Float — entry, gather, present, reflect circulation diagram\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/float/renders/concept-opacity-isolation.png\" alt=\"Float — opacity and isolation concept\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/renders/concept-transparency-community.png\" alt=\"Float — transparency and community concept\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/float/planssections/level-1-floor-plan.png\" alt=\"Float — Level 1 floor plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/planssections/level-2-floor-plan.png\" alt=\"Float — Level 2 floor plan\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/planssections/level-3-floor-plan.png\" alt=\"Float — Level 3 floor plan\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/float/planssections/longitudinal-section.png\" alt=\"Float — longitudinal section\" loading=\"lazy\"></div><div class=\"ch-context\"><img src=\"/images/habersham-hall/float/renders/interior-stair-01.png\" alt=\"Float — section perspective through the flooded courtyard\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/renders/interior-corridor.png\" alt=\"Float — entry bridge over the reflecting pool, day\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/renders/interior-bridge.png\" alt=\"Float — entry bridge over the reflecting pool, night\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/renders/interior-auditorium.png\" alt=\"Float — auditorium interior, day\" loading=\"lazy\"><img src=\"/images/habersham-hall/float/renders/interior-presentation.png\" alt=\"Float — auditorium interior, presentation\" loading=\"lazy\"></div>"
