description: |
  <p>Two design-build proposals for Habersham Hall, a Moorish Revival former Chatham County jail in Savannah that SCAD is converting into an Atelier and 200-seat auditorium: Unveil reworks the building's threshold as a sequence of arrival and revelation, while Float imagines a flooded courtyard and a suspended timber hall that lets the historic jail cohabitate with the rising sea.</p>

