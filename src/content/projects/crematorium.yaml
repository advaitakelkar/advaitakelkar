description: |
  <p>A self-initiated civic proposal to the BMC for a pet crematorium in Borivali, a place for the city to say goodbye to its animals with some dignity. Mumbai has long lacked proper facilities for this quiet, common grief.</p>
  <p>The building itself makes a second argument: its surfaces reuse ceramic tile waste from the city's metro construction, giving discarded material a second life in a space devoted to endings. Designed with Faizan Khatri and Devarsh Deth.</p>

