description: |
  <p>This artwork is an homage to Carlo Scarpa and his craft. Scarpa's signature elements, the orthographic steps, repeating patterns, and rigorous structural grids, have always reminded me of Indian stepwells. Bridging those two architectural vocabularies became the experiment: a series of custom tiles in varying dimensions.</p>
  <p>The tiles are three-dimensional closed shapes rather than flat paintings. They interact with light and shadow, casting geometric patterns that shift through the day and giving the gallery wall where they were exhibited a quietly changing life of its own.</p>
