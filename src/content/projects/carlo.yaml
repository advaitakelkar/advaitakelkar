description: |
  <p>In homage to Carlo Scarpa, this artwork was produced through deep inspiration from his craft. Scarpa's signature design elements—incorporating orthographic steps, repeating patterns, and highly structural architectural grids—remind us of Indian stepwells. The fascination with bridging these two architectural vocabularies led to an experimental exploration of creating multiple tiles of varying dimensions.</p>
  <p>These customized tiles are three-dimensional closed shapes rather than traditional 2D flat paintings. They actively interact with light and shadow, casting shifting geometric patterns throughout the day to create a dynamic, experiential effect within the gallery space where they were exhibited.</p>
