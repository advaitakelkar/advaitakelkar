description: |
  <p>Virtual Gods is India's first online group art exhibition, hosted live by the ARCHV collective in August 2020, at the height of the COVID lockdown. With galleries shut and everyone stuck at home, we built the show a virtual space instead, gathering artists across disciplines into one exhibition and an online meet-up around it.</p>
  <p>The exhibition remains live today, a small time capsule of what making together looked like when no one could meet.</p>

