description: |
  <p>Commissioned for a residence on Mumbai's Worli Sea Face, CONCRT is a study in urban materiality: concrete treated as a medium for art rather than structure. The piece, titled Riverside A + B, grew out of a long back-and-forth with the client, sitting somewhere between painting and sculpture.</p>
  <p>Each monolithic slab is handcrafted and weighs about 70 pounds, its three-dimensional surface reading as a textural composition of the city itself. Paired with wooden construction models, the work carries the permanence, weight, and complexity of a city that never stops rebuilding. This was my first commissioned artwork, created with Nayan Mote of NMS Studio, and it still means a great deal to me.</p>

