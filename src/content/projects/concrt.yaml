description: |
  <p>Commissioned for a luxury residence on Mumbai’s prestigious World Seaface, CNCRT is a study in urban materiality, reimagining concrete as a medium for artistic expression. Rooted in modernity and architectural language, Riverside A + B was developed through an iterative dialogue with the client, resulting in a bespoke piece that bridges art and structure.</p>
  <p>Blurring the lines between painting and sculpture, these monolithic slabs—handcrafted and weighing approximately 70 pounds each—transform three-dimensional forms into a striking, textural composition. Paired with wooden construction models, the artwork reflects the evolving urban landscape, embodying the permanence, weight, and complexity of contemporary cityscapes. As my first commissioned work, this project was a significant milestone, created in collaboration with Nayan Mote from NMS Studio, bringing together a shared vision of material exploration and craftsmanship.</p>

