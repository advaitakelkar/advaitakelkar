name: Freelancer
displayName: Freelancer
tagline: "A space for my experiments"
intro:
  - "This collection compiles my independent work—a space built on pure curiosity and the constant generation of new ideas. It serves as a personal archive of individual experiments and collaborative projects developed with close friends over the years."
  - "Working as a freelancer means shaping each project from concept to delivery, managing the entire creative lifecycle while collaborating directly with other artists and design studios."
  - "Beyond core architecture, this experimental playground expands into graphic design, web development, art, and prototyping. I view these diverse mediums as natural extensions of my architectural practice, sharing the same underlying workflow and creative curiosity."
