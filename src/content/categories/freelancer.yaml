name: Freelancer
displayName: Freelancer
tagline: "A curated collection of work in this space."
intro:
  - "This is my independent and freelance work — self-directed projects across architecture, interiors, visual identity, product, and art."
  - "Working independently means shaping each project end to end, from concept to delivery, often in collaboration with other artists and studios."
  - "It includes art and exhibition collaborations such as the CARLO and Urban Dichotomy collections, shown with Nayan Mote Studio at the India Art Fair in Mumbai."
