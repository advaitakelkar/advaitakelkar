name: Freelancer
displayName: Freelancer
tagline: "A space for my independent work and experiments."
intro:
  - "This collection gathers my independent work, a space built on pure curiosity and the itch to try new ideas. It's a personal archive of solo experiments and collaborations developed with close friends over the years."
  - "Working freelance means shaping each project from concept to delivery: owning the whole creative process while working directly with other artists and design studios."
  - "Beyond architecture, this playground spills into graphic design, web development, art, AI imagery, and prototyping. I see these mediums as natural extensions of my architectural practice; the tools change, but the way of thinking stays the same."
