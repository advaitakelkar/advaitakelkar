name: Academic
displayName: Academic
tagline: "Selected work from my MArch at SCAD and my BArch in Mumbai."
intro:
  - "This is a collection of my academic work from the Savannah College of Art and Design (SCAD) and DBHCOA, University of Mumbai. The projects range widely in scale and typology: mass housing, hospitality, cultural spaces, computational research, and group collaborations."
  - "My foundations were built during my Bachelor of Architecture in Mumbai, where I learned the physical craft of drafting and hands-on making. Key moments included the NASA ANDC competition, heading design workshops, leading the Meraki seminar series, and my thesis BOM_MUM, an in-depth look at Mumbai's cultural and economic transition out of its colonial past."
  - "After five years in practice, I left India for my Master of Architecture at SCAD to test the limits of design. Here I immersed myself in parametric tools like Grasshopper, Midjourney, and Unreal Engine, folding AI-assisted processes into a thesis on cultural fusion. In this academic space I learned to think through making, treating each project as a test of a question rather than a predetermined answer."
