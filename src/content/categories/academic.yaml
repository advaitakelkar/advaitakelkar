name: Academic
displayName: Academic
tagline: "Collection of selected work from my MArch and BArch, Architecture"
intro:
  - "This is a collection of my academic work spanning my time at the Savannah College of Art and Design (SCAD) and DBHCOA, University of Mumbai. These projects cover diverse scales and typologies, from mass housing and hospitality to cultural spaces, computational research, and group collaborations."
  - "My foundations were built during my Bachelor of Architecture in Mumbai, where I learned the physical craft of drafting and hands-on making. Key moments included participating in the NASA ANDC competition, heading design workshops, leading the Meraki seminar series, and my thesis 'BOM_MUM'—an in-depth exploration of Mumbai's cultural and economic transition from its colonial past."
  - "After five years in the professional industry, I left India for my Master of Architecture at SCAD to explore the limits of design. Here, I immersed myself in parametric tools like Grasshopper, Midjourney, and Unreal Engine, blending AI-assisted processes with a thesis on cultural fusions. In this academic space, I learned to think through making: where each project is a test of a question rather than a predetermined answer."
