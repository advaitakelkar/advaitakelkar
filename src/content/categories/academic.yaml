name: Academic
displayName: Academic
tagline: "A curated collection of work in this space."
intro:
  - "This is my academic work — from my Bachelor of Architecture in Mumbai to my Master of Architecture at SCAD (Savannah College of Art and Design, 2024–2027), where ideas can be pushed without the constraints of a brief or a client."
  - "At SCAD I work across parametric tools — Grasshopper, Midjourney, Unreal — and AI-assisted processes, with a thesis exploring cultural fusions. School is where I learned to think through making: each project tests a question rather than delivering an answer."
  - "From hands-on, full-scale builds to computational research, this is where I refine the principles and curiosity that carry into everything I make — balancing intensity with personal growth."
