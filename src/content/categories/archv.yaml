name: Archv
displayName: ARCHV
tagline: "A collective built for the love of architecture."
intro:
  - "ARCHV began as a conversation between friends in the strange stretch before, during, and after COVID. We wanted a transdisciplinary space for collaborative design projects, bringing people from different creative fields together under an architectural lens."
  - "The rule was simple: build purely for the love of the craft, free from commercial briefs or financial motives. Together with my batchmates, we pooled our different interests to document ideas, create installations, and construct spaces side by side with many collaborators."
  - "That effort grew into a supportive network that still feeds our individual practices, letting us dabble in graphic design, prototyping, and hands-on building. From the Celebrate Bandra installation to Virtual Gods, India's first online group art exhibition, ARCHV remains a place where design and togetherness come to life."
