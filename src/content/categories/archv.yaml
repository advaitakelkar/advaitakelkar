name: Archv
displayName: ARCHV
tagline: "A curated collection of work in this space."
intro:
  - "ARCHV is an inclusive architecture collective I co-founded — a transdisciplinary space built around collaborative learning and creation."
  - "We prioritize passion over the constraints of money and time, facilitating projects with diverse participation, driven by collective effort and a shared love for design and innovation."
  - "ARCHV's work spans installations and public exhibitions — Celebrate Bandra, Dhal Ni Pol, Raw Collaborative, and Virtual Gods, India's first online group art exhibition — connecting creators through design and technology."
