name: Archv
displayName: ARCHV
tagline: "Collaborative portal for the love of Architecture."
intro:
  - "ARCHV began as a collaborative conversation between friends, born out of the transition before, during, and after COVID. Our goal was to create a transdisciplinary space for collaborative design projects, bringing together people from various creative fields under an architectural lens."
  - "We wanted to build something purely for the love of the craft, free from the constraints of commercial briefs or financial motives. Together with my batchmates, we welded our different interests to document ideas, create installations, and construct spaces side-by-side with multiple collaborators."
  - "This collective effort grew into a supportive network for future practices, allowing us to dwell in graphic design, prototyping, and hands-on building. From Celebrate Bandra to India's first online group art exhibition, Virtual Gods, ARCHV remains a space where design and togetherness come to life."
