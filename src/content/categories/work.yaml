name: Work
displayName: Work
tagline: "Professional work from my years at Studio 823 and FKD Workshop."
intro:
  - "This is the professional work I was part of at Studio 823 and FKD Workshop between 2018 and 2023: hospitality, commercial, and residential projects in Mumbai and across India, from Jaipur to Kolkata."
  - "Both studios shaped how I practice. Under the mentorship of Samir, Faizan, and Siddhesh, I joined Studio 823 as an intern in my final year of school and grew into a full-time architect there. It was a fast, demanding environment, and it laid my professional foundation."
  - "Starting in 2021, I worked alongside Faizan to build FKD Workshop from the ground up: establishing the studio practice, leading teams, and managing projects from initial pitch to onsite execution. It gave me the chance to direct large hospitality and public projects, often several at once."
