name: Work
displayName: Work
tagline: "Collection of all professional work that I am a part of."
intro:
  - "This represents my professional journey built at Studio 823 and FKD Workshop between 2018 and 2023, spanning hospitality, commercial, and residential projects across Mumbai."
  - "Both of these studios deeply shaped my architectural approach. Under the mentorship of Samir, Faizan, and Siddhesh, I began as an intern at Studio 823 in my final year and transitioned into a full-time architect, working in a dynamic environment that laid my professional foundation."
  - "Starting in 2021, I collaborated with Faizan to build FKD Workshop from the ground up, establishing the studio practice, leading teams, and managing projects from initial pitch to onsite execution. This experience allowed me to direct large-scale hospitality and public projects, coordinating multiple designs simultaneously."
