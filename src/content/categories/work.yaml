name: Work
displayName: Work
tagline: "A curated collection of work in this space."
intro:
  - "This is my professional work from Studio 823 and FKD Workshop — hospitality, commercial, and residential projects built across Mumbai between 2018 and 2023."
  - "I began at Studio 823 (Studio Eight Twentythree) as an intern in my final year of architecture and grew into a full-time architect. Mentored by Samir Raut and Faizan Khatri, I worked across hospitality, commercial spaces, architectural research, and residential interiors in a dynamic, enriching environment that laid the foundation for my professional growth."
  - "From 2021 I joined Faizan Khatri to build FKD Workshop from the ground up — establishing a new studio, building and leading teams, and mentoring junior professionals. I led architecture, interior design, visualization, rendering, and project management for hospitality, public spaces, and residential projects, while crafting proposals and coordinating several projects at once."
